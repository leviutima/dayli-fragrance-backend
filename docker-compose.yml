services:
  postgres:
    image: postgres:16-alpine
    container_name: dayli_postgres
    environment:
      POSTGRES_USER: dayli
      POSTGRES_PASSWORD: dayli123
      POSTGRES_DB: dayli_db
    ports:
      - "5432:5432"
    volumes:
      - dayli_postgres_data:/var/lib/postgresql/data

volumes:
  dayli_postgres_data:
